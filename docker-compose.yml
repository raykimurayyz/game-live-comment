services:
  gamelivecomment:
    build: .
    container_name: gamelivecomment
    restart: unless-stopped
    ports:
      - "3010:3010"
      - "6667:6667"
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      NODE_ENV: production
      DOUYU_ROOM_ID: ""
      DOUYU_INCLUDE_GIFTS: "false"
      HUYA_ROOM_ID: ""
      HUYA_INCLUDE_GIFTS: "false"
